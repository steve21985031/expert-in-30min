<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">expert-in-30min concept map</title>
  <desc id="desc">An infographic showing the workflow, search layers, and output system of the expert-in-30min skill.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7efe4"/>
      <stop offset="100%" stop-color="#fffaf5"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#d15f17"/>
      <stop offset="100%" stop-color="#1e6a6f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#5b4028" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 58px 'Helvetica Neue', Arial, sans-serif; fill: #1f1a17; }
      .subtitle { font: 400 24px 'Helvetica Neue', Arial, sans-serif; fill: #5f564f; }
      .h { font: 700 24px 'Helvetica Neue', Arial, sans-serif; fill: #1f1a17; }
      .b { font: 400 18px 'Helvetica Neue', Arial, sans-serif; fill: #403834; }
      .s { font: 700 16px 'Helvetica Neue', Arial, sans-serif; fill: #c25a17; letter-spacing: 1px; }
      .tag { font: 700 15px 'Helvetica Neue', Arial, sans-serif; fill: #1e6a6f; }
      .small { font: 400 15px 'Helvetica Neue', Arial, sans-serif; fill: #6b625b; }
      .card { fill: #fffdf9; stroke: #ead9c6; stroke-width: 2; rx: 26; }
      .chip { fill: #f3e3d4; stroke: #e3cdb5; stroke-width: 1; rx: 999; }
      .line { stroke: #c25a17; stroke-width: 4; stroke-linecap: round; opacity: .55; }
      .line2 { stroke: #1e6a6f; stroke-width: 4; stroke-linecap: round; opacity: .45; }
    </style>
  </defs>
  <rect width="1600" height="980" fill="url(#bg)"/>
  <circle cx="1430" cy="120" r="180" fill="#f8dfcb" opacity=".6"/>
  <circle cx="180" cy="820" r="220" fill="#dfeeed" opacity=".6"/>
  <rect x="70" y="56" width="1460" height="168" rx="34" fill="#fffaf4" stroke="#ebdccd" stroke-width="2" filter="url(#shadow)"/>
  <rect x="94" y="84" width="230" height="36" rx="18" fill="url(#hero)"/>
  <text x="112" y="109" class="small" fill="#fff">WORKFLOW SKILL / PUBLIC REPO READY</text>
  <text x="96" y="160" class="title">expert-in-30min</text>
  <text x="96" y="198" class="subtitle">Turn an unfamiliar domain into a structured expert-style narrative, report, and HTML view in about 30 minutes.</text>
  <rect x="78" y="270" width="450" height="286" class="card" filter="url(#shadow)"/>
  <text x="106" y="314" class="s">Input Layer</text>
  <text x="106" y="352" class="h">Start With Two Questions</text>
  <rect x="106" y="382" width="394" height="64" class="chip"/>
  <text x="126" y="420" class="b">1. Which domain do you want to learn fast?</text>
  <rect x="106" y="460" width="394" height="78" class="chip"/>
  <text x="126" y="498" class="b">2. Which style do you want?</text>
  <text x="126" y="526" class="small">Academia / Consulting / IP voice</text>
  <rect x="574" y="270" width="450" height="286" class="card" filter="url(#shadow)"/>
  <text x="602" y="314" class="s">Search Layer</text>
  <text x="602" y="352" class="h">Four Search Passes</text>
  <text x="602" y="390" class="tag">Bone</text>
  <text x="680" y="390" class="b">Object, goal, metric, variable</text>
  <text x="602" y="430" class="tag">Terms</text>
  <text x="680" y="430" class="b">Insider language and misuse points</text>
  <text x="602" y="470" class="tag">Views</text>
  <text x="680" y="470" class="b">Consensus, debates, outdated takes</text>
  <text x="602" y="510" class="tag">Expression</text>
  <text x="730" y="510" class="b">FAQ, phrasing, hooks, talking points</text>
  <rect x="1070" y="270" width="460" height="286" class="card" filter="url(#shadow)"/>
  <text x="1098" y="314" class="s">Compression Layer</text>
  <text x="1098" y="352" class="h">Turn Search Into Slots</text>
  <text x="1098" y="392" class="b">• Domain skeleton</text>
  <text x="1098" y="428" class="b">• Terminology table</text>
  <text x="1098" y="464" class="b">• Views / debates / outdated narratives</text>
  <text x="1098" y="500" class="b">• Expert-style reusable phrasing</text>
  <text x="1098" y="536" class="b">• Risk boundaries and confidence rules</text>
  <line x1="528" y1="414" x2="574" y2="414" class="line"/>
  <line x1="1024" y1="414" x2="1070" y2="414" class="line"/>
  <rect x="78" y="616" width="1452" height="284" class="card" filter="url(#shadow)"/>
  <text x="106" y="660" class="s">Output Layer</text>
  <text x="106" y="698" class="h">One Source Document, One Beautiful HTML</text>
  <rect x="112" y="732" width="520" height="128" class="chip"/>
  <text x="138" y="772" class="h">report.md</text>
  <text x="138" y="806" class="b">The single structured source of truth.</text>
  <text x="138" y="834" class="small">Basic info → 30s → 3min → skeleton → terms → views → debates → outdated takes → talking points → FAQ → risks → action</text>
  <rect x="708" y="732" width="520" height="128" class="chip"/>
  <text x="734" y="772" class="h">index.html</text>
  <text x="734" y="806" class="b">The polished visual rendering of the same structure.</text>
  <text x="734" y="834" class="small">Cards, hierarchy, navigation, FAQ folding, visual emphasis, and browser-ready delivery.</text>
  <rect x="1260" y="728" width="236" height="136" rx="24" fill="#1f1a17"/>
  <text x="1286" y="770" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" fill="#fff8ef">Public Repo Upgrade</text>
  <text x="1286" y="804" class="small" fill="#f1ddd0">• bilingual README</text>
  <text x="1286" y="832" class="small" fill="#f1ddd0">• infographic preview</text>
  <text x="1286" y="860" class="small" fill="#f1ddd0">• assets/ ready for GitHub</text>
  <line x1="632" y1="796" x2="708" y2="796" class="line2"/>
</svg>
